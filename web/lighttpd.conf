# Deneb Web UI - lighttpd configuration
# Serves static files and reverse-proxies API to deneb-api

server.document-root = "/www/deneb"
server.port = 80
server.bind = "0.0.0.0"
server.max-connections = 8
server.max-keep-alive-requests = 16
server.modules = ("mod_proxy", "mod_setenv", "mod_access")
index-file.names = ("index.html")

# Security headers
setenv.add-response-header = (
    "X-Content-Type-Options" => "nosniff",
    "X-Frame-Options" => "DENY",
    "Cache-Control" => "no-store"
)

# Proxy API requests to deneb-api Unix socket
# Note: lighttpd may buffer SSE responses; for real-time streaming,
# the deneb-api binary may need to listen on a TCP port directly.
$HTTP["url"] =~ "^/(api|cluster-api)/" {
    proxy.server = ("" => (
        "host" => (
            "socket" => "/var/run/deneb-api.sock"
        )
    ))
    # Allow SSE streaming through proxy
    proxy.header = ("upgrade" => "enable")
}

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".svg"  => "image/svg+xml",
    ".ico"  => "image/x-icon"
)

# SSE endpoints: disable buffering
$HTTP["url"] == "/api/v1/deneb/events" {
    proxy.header = ("upgrade" => "enable")
    connection.kbytes-per-second = 0  # unlimited
}

# Deny access to non-web files
$HTTP["url"] =$ ".init" {
    url.access-deny = ("")
}
$HTTP["url"] =$ ".sh" {
    url.access-deny = ("")
}
$HTTP["url"] =$ ".md" {
    url.access-deny = ("")
}
$HTTP["url"] =$ ".txt" {
    url.access-deny = ("")
}
$HTTP["url"] =$ ".conf" {
    url.access-deny = ("")
}
